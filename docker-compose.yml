services:
  app:
    build: .
    image: chat-gw:local
    container_name: chat-gw-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: chat-gw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatgw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatgw}
      POSTGRES_DB: ${POSTGRES_DB:-chat_gw}
    # Host port 15432 (Docker-side 5432 already in use by another local stack).
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./migrations/002_seeds.sql:/docker-entrypoint-initdb.d/002_seeds.sql:ro
      - ./migrations/003_cloud_cost_tools.sql:/docker-entrypoint-initdb.d/003_cloud_cost_tools.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatgw} -d ${POSTGRES_DB:-chat_gw}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: chat-gw-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s

volumes:
  pgdata:
